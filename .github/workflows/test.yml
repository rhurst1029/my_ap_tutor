name: MyAPTutor CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: python -m venv backend/venv && source backend/venv/bin/activate && pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - name: Run backend tests
        run: source backend/venv/bin/activate && python -m pytest testing/tests/backend/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "ci-dummy-key"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Run frontend tests
        run: cd frontend && npm test
